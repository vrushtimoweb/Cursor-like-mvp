<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI IDE</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #111;
      --panel: #1a1a1a;
      --panel-2: #181818;
      --border: #333;
      --text: #eee;
      --muted: #aaa;
      --input: #0d0d0d;
      --hover: #2a2a2a;
      --button: #2d6cdf;
    }

    body.light {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --panel-2: #f0f0f0;
      --border: #d0d0d0;
      --text: #111;
      --muted: #555;
      --input: #ffffff;
      --hover: #e8e8e8;
      --button: #2563eb;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr 360px;
      height: 100vh;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 12px;
      overflow: auto;
    }

    .sidebar h3, .right h3 {
      margin-top: 0;
    }

    .project-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .project-controls input, textarea, .command-input {
      width: 100%;
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 10px;
      border-radius: 6px;
    }

    .project-actions {
      display: flex;
      gap: 8px;
    }

    .project-actions button {
      flex: 1;
    }

    .project-name {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      word-break: break-word;
    }

    .tree-row, .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
    }

    .tree-row:hover,
    .tree-row.active,
    .tab.active {
      background: var(--hover);
    }

    .tree-children {
      margin-left: 16px;
      border-left: 1px solid var(--border);
      padding-left: 8px;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
    }

    .filename {
      flex: 1;
      font-size: 14px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      overflow-x: auto;
    }

    .tab {
      white-space: nowrap;
      background: transparent;
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
    }

    .editor {
      flex: 1;
      min-height: 0;
    }

    .bottom-panel {
      height: 190px;
      border-top: 1px solid var(--border);
      background: var(--input);
      display: flex;
      flex-direction: column;
    }

    .bottom-panel-header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }

    .terminal-output {
      flex: 1;
      overflow: auto;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 13px;
      padding: 10px 12px;
    }

    .right {
      background: var(--panel);
      border-left: 1px solid var(--border);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: inherit;
    }

    pre {
      flex: 1;
      margin: 0;
      overflow: auto;
      white-space: pre-wrap;
      background: var(--input);
      border: 1px solid var(--border);
      padding: 10px;
      font-size: 13px;
      border-radius: 6px;
    }

    button {
      background: var(--button);
      color: white;
      border: none;
      padding: 9px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    .command-palette-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding-top: 80px;
      z-index: 9999;
    }

    .command-palette {
      width: min(700px, 92vw);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .command-results {
      max-height: 360px;
      overflow: auto;
    }

    .command-item {
      padding: 10px 12px;
      cursor: pointer;
      border-top: 1px solid var(--border);
    }

    .command-item:hover,
    .command-item.active {
      background: var(--hover);
    }

    .shortcut-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h3>Explorer</h3>

      <div class="project-controls">
        <input id="projectPathInput" placeholder="Enter project folder path" />
        <div class="project-actions">
          <button id="openProjectBtn">Open by Path</button>
          <button id="pickProjectBtn">Pick Folder</button>
        </div>
      </div>

      <div id="projectName" class="project-name">No project loaded</div>
      <div id="treeRoot"></div>

      <div class="shortcut-hint">
        Ctrl/Cmd+P → Quick Open<br>
        Ctrl/Cmd+Shift+P → Command Palette<br>
        Ctrl/Cmd+S → Save<br>
        Ctrl/Cmd+Enter → Run<br>
        Ctrl/Cmd+I → Ask AI<br>
        Ctrl/Cmd+B → Toggle Sidebar<br>
        Ctrl/Cmd+J → Toggle Terminal<br>
        Ctrl/Cmd+W → Close Tab
      </div>
    </aside>

    <section class="main">
      <div class="topbar">
        <div class="filename" id="currentFile">No file open</div>
        <button id="saveBtn">Save</button>
        <button id="runBtn">Run</button>
        <button id="themeBtn">Toggle Theme</button>
      </div>

      <div id="tabs" class="tabs"></div>
      <div id="editor" class="editor"></div>

      <div id="terminalPanel" class="bottom-panel">
        <div class="bottom-panel-header">Terminal Output</div>
        <div id="terminalOutput" class="terminal-output"></div>
      </div>
    </section>

    <aside id="rightPanel" class="right">
      <h3>AI Assistant</h3>
      <textarea id="instruction" placeholder="Ask AI to refactor, fix bugs, add typing, explain, etc."></textarea>
      <button id="askBtn">Ask AI</button>
      <button id="applyBtn">Apply AI Result</button>
      <pre id="aiResponse"></pre>
    </aside>
  </div>

  <div id="paletteOverlay" class="command-palette-overlay">
    <div class="command-palette">
      <input id="paletteInput" class="command-input" placeholder="Type a command or file name..." />
      <div id="paletteResults" class="command-results"></div>
    </div>
  </div>

  <script type="module">
    import * as monaco from 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/+esm'

    const API = 'http://127.0.0.1:8000'

    const projectPathInput = document.getElementById('projectPathInput')
    const openProjectBtn = document.getElementById('openProjectBtn')
    const pickProjectBtn = document.getElementById('pickProjectBtn')
    const projectNameEl = document.getElementById('projectName')
    const treeRootEl = document.getElementById('treeRoot')

    const currentFileEl = document.getElementById('currentFile')
    const terminalOutputEl = document.getElementById('terminalOutput')
    const instructionEl = document.getElementById('instruction')
    const aiResponseEl = document.getElementById('aiResponse')
    const saveBtn = document.getElementById('saveBtn')
    const runBtn = document.getElementById('runBtn')
    const themeBtn = document.getElementById('themeBtn')
    const askBtn = document.getElementById('askBtn')
    const applyBtn = document.getElementById('applyBtn')
    const tabsEl = document.getElementById('tabs')
    const rightPanelEl = document.getElementById('rightPanel')
    const terminalPanelEl = document.getElementById('terminalPanel')

    const paletteOverlay = document.getElementById('paletteOverlay')
    const paletteInput = document.getElementById('paletteInput')
    const paletteResults = document.getElementById('paletteResults')

    let currentFile = null
    let lastAIResponse = ''
    let activeFileEl = null
    let allFiles = []
    let openTabs = []
    let paletteMode = 'commands'

    const editor = monaco.editor.create(document.getElementById('editor'), {
      value: '',
      language: 'python',
      theme: 'vs-dark',
      automaticLayout: true,
      minimap: { enabled: false },
      fontSize: 14
    })

    const commands = [
      { id: 'save', label: 'File: Save', run: () => saveFile() },
      { id: 'run', label: 'Run: Run Current File', run: () => runFile() },
      { id: 'ask-ai', label: 'AI: Ask AI About Current File', run: () => askAI() },
      { id: 'apply-ai', label: 'AI: Apply AI Result', run: () => applyAI() },
      { id: 'toggle-theme', label: 'View: Toggle Theme', run: () => toggleTheme() },
      { id: 'toggle-sidebar', label: 'View: Toggle Sidebar', run: () => toggleSidebar() },
      { id: 'toggle-terminal', label: 'View: Toggle Terminal', run: () => toggleTerminal() },
      { id: 'quick-open', label: 'Go: Quick Open File', run: () => showPalette('files') },
      { id: 'close-tab', label: 'File: Close Current Tab', run: () => closeCurrentTab() },
      { id: 'pick-folder', label: 'File: Pick Project Folder', run: () => pickProject() },
      { id: 'open-path', label: 'File: Open Project By Path', run: () => openProjectByPath() },
    ]

    function getLanguageFromPath(path) {
      if (path.endsWith('.py')) return 'python'
      if (path.endsWith('.js')) return 'javascript'
      if (path.endsWith('.ts')) return 'typescript'
      if (path.endsWith('.json')) return 'json'
      if (path.endsWith('.html')) return 'html'
      if (path.endsWith('.css')) return 'css'
      if (path.endsWith('.md')) return 'markdown'
      return 'plaintext'
    }

    function toggleTheme() {
      const isLight = document.body.classList.toggle('light')
      monaco.editor.setTheme(isLight ? 'vs' : 'vs-dark')
      localStorage.setItem('ide-theme', isLight ? 'light' : 'dark')
    }

    function applySavedTheme() {
      const theme = localStorage.getItem('ide-theme') || 'dark'
      if (theme === 'light') {
        document.body.classList.add('light')
        monaco.editor.setTheme('vs')
      }
    }

    function toggleSidebar() {
      const sidebar = document.querySelector('.sidebar')
      sidebar.style.display = sidebar.style.display === 'none' ? 'block' : 'none'
      document.querySelector('.app').style.gridTemplateColumns =
        sidebar.style.display === 'none' ? '0 1fr 360px' : '280px 1fr 360px'
    }

    function toggleTerminal() {
      terminalPanelEl.style.display = terminalPanelEl.style.display === 'none' ? 'flex' : 'none'
    }

    async function fetchProjectInfo() {
      const res = await fetch(API + '/project')
      const data = await res.json()
      projectNameEl.textContent = `${data.name} — ${data.root}`
      projectPathInput.value = data.root
    }

    async function fetchFiles() {
      const res = await fetch(API + '/files')
      const data = await res.json()
      allFiles = data.files || []
    }

    async function openProjectByPath() {
      const folderPath = projectPathInput.value.trim()
      if (!folderPath) {
        alert('Enter a project folder path')
        return
      }

      const res = await fetch(API + '/open-project', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folder_path: folderPath })
      })

      const data = await res.json()
      if (data.detail) {
        alert(data.detail)
        return
      }

      resetOpenState()
      await refreshProject()
    }

    async function pickProject() {
      const res = await fetch(API + '/pick-project', { method: 'POST' })
      const data = await res.json()

      if (data.detail) {
        alert(data.detail)
        return
      }

      resetOpenState()
      await refreshProject()
    }

    async function refreshProject() {
      await fetchProjectInfo()
      await fetchFiles()
      await loadTree()
    }

    function resetOpenState() {
      currentFile = null
      currentFileEl.textContent = 'No file open'
      editor.setValue('')
      terminalOutputEl.textContent = ''
      aiResponseEl.textContent = ''
      lastAIResponse = ''
      openTabs = []
      renderTabs()

      if (activeFileEl) {
        activeFileEl.classList.remove('active')
        activeFileEl = null
      }
    }

    function createTreeNode(node) {
      const wrapper = document.createElement('div')

      const row = document.createElement('div')
      row.className = 'tree-row'
      row.textContent = node.type === 'directory' ? `📁 ${node.name}` : `📄 ${node.name}`
      wrapper.appendChild(row)

      if (node.type === 'file') {
        row.onclick = () => openFile(node.path, row)
      } else {
        const childrenWrap = document.createElement('div')
        childrenWrap.className = 'tree-children'

        if (!node.children || node.children.length === 0) {
          const empty = document.createElement('div')
          empty.className = 'muted'
          empty.textContent = 'empty'
          childrenWrap.appendChild(empty)
        } else {
          for (const child of node.children) {
            childrenWrap.appendChild(createTreeNode(child))
          }
        }

        wrapper.appendChild(childrenWrap)

        let expanded = true
        row.onclick = () => {
          expanded = !expanded
          childrenWrap.style.display = expanded ? 'block' : 'none'
        }
      }

      return wrapper
    }

    async function loadTree() {
      const res = await fetch(API + '/tree')
      const data = await res.json()

      treeRootEl.innerHTML = ''

      for (const node of data.tree) {
        treeRootEl.appendChild(createTreeNode(node))
      }
    }

    function ensureTab(path) {
      if (!openTabs.includes(path)) {
        openTabs.push(path)
      }
      renderTabs()
    }

    function renderTabs() {
      tabsEl.innerHTML = ''
      openTabs.forEach(path => {
        const tab = document.createElement('div')
        tab.className = 'tab' + (path === currentFile ? ' active' : '')
        tab.textContent = path.split('/').pop()
        tab.title = path
        tab.onclick = () => openFile(path)
        tabsEl.appendChild(tab)
      })
    }

    function closeCurrentTab() {
      if (!currentFile) return
      const idx = openTabs.indexOf(currentFile)
      if (idx >= 0) openTabs.splice(idx, 1)

      if (openTabs.length > 0) {
        const next = openTabs[Math.max(0, idx - 1)] || openTabs[0]
        openFile(next)
      } else {
        currentFile = null
        currentFileEl.textContent = 'No file open'
        editor.setValue('')
        renderTabs()
      }
    }

    async function openFile(path, rowEl = null) {
      const res = await fetch(API + '/read', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path })
      })

      const data = await res.json()
      if (data.detail) {
        alert(data.detail)
        return
      }

      currentFile = path
      currentFileEl.textContent = path
      editor.setValue(data.content || '')
      monaco.editor.setModelLanguage(editor.getModel(), getLanguageFromPath(path))
      ensureTab(path)

      if (activeFileEl) activeFileEl.classList.remove('active')
      if (rowEl) {
        rowEl.classList.add('active')
        activeFileEl = rowEl
      }
    }

    async function saveFile() {
      if (!currentFile) {
        alert('Open a file first')
        return
      }

      const res = await fetch(API + '/write', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          path: currentFile,
          content: editor.getValue()
        })
      })

      const data = await res.json()
      if (data.detail) {
        alert(data.detail)
        return
      }
      terminalOutputEl.textContent = 'Saved: ' + currentFile
    }

    async function runFile() {
      if (!currentFile) {
        alert('Open a file first')
        return
      }

      terminalOutputEl.textContent = 'Running...'

      const res = await fetch(API + '/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: currentFile })
      })

      const data = await res.json()
      if (data.detail) {
        terminalOutputEl.textContent = 'Error: ' + data.detail
        return
      }

      terminalOutputEl.textContent =
        `Exit Code: ${data.exit_code}\n\n` +
        `STDOUT:\n${data.stdout || ''}\n` +
        `STDERR:\n${data.stderr || ''}`
    }

    async function askAI() {
      if (!currentFile) {
        alert('Open a file first')
        return
      }

      if (!instructionEl.value.trim()) {
        alert('Enter an instruction first')
        return
      }

      aiResponseEl.textContent = 'Thinking...'

      const res = await fetch(API + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          instruction: instructionEl.value,
          code: editor.getValue(),
          file_path: currentFile
        })
      })

      const data = await res.json()
      if (data.detail) {
        aiResponseEl.textContent = 'Error: ' + data.detail
        return
      }

      lastAIResponse = data.response || ''
      aiResponseEl.textContent = lastAIResponse
    }

    function applyAI() {
      if (!lastAIResponse.trim()) {
        alert('No AI result to apply')
        return
      }
      editor.setValue(lastAIResponse)
    }

    function showPalette(mode = 'commands') {
      paletteMode = mode
      paletteOverlay.style.display = 'flex'
      paletteInput.value = ''
      renderPaletteResults()
      setTimeout(() => paletteInput.focus(), 0)
    }

    function hidePalette() {
      paletteOverlay.style.display = 'none'
    }

    function renderPaletteResults() {
      const q = paletteInput.value.trim().toLowerCase()
      paletteResults.innerHTML = ''

      const items = paletteMode === 'files'
        ? allFiles
            .filter(f => f.toLowerCase().includes(q))
            .slice(0, 50)
            .map(f => ({ label: f, action: () => { hidePalette(); openFile(f) } }))
        : commands
            .filter(c => c.label.toLowerCase().includes(q))
            .map(c => ({ label: c.label, action: () => { hidePalette(); c.run() } }))

      if (items.length === 0) {
        const empty = document.createElement('div')
        empty.className = 'command-item'
        empty.textContent = 'No results'
        paletteResults.appendChild(empty)
        return
      }

      items.forEach((item, index) => {
        const div = document.createElement('div')
        div.className = 'command-item' + (index === 0 ? ' active' : '')
        div.textContent = item.label
        div.onclick = item.action
        paletteResults.appendChild(div)
      })
    }

    paletteInput.addEventListener('input', renderPaletteResults)

    paletteInput.addEventListener('keydown', (e) => {
      const items = [...paletteResults.querySelectorAll('.command-item')]
      const active = paletteResults.querySelector('.command-item.active')
      let idx = items.indexOf(active)

      if (e.key === 'ArrowDown') {
        e.preventDefault()
        if (items.length === 0) return
        if (idx >= 0) items[idx].classList.remove('active')
        idx = (idx + 1) % items.length
        items[idx].classList.add('active')
      } else if (e.key === 'ArrowUp') {
        e.preventDefault()
        if (items.length === 0) return
        if (idx >= 0) items[idx].classList.remove('active')
        idx = idx <= 0 ? items.length - 1 : idx - 1
        items[idx].classList.add('active')
      } else if (e.key === 'Enter') {
        e.preventDefault()
        active?.click()
      } else if (e.key === 'Escape') {
        hidePalette()
      }
    })

    paletteOverlay.addEventListener('click', (e) => {
      if (e.target === paletteOverlay) hidePalette()
    })

    document.addEventListener('keydown', (e) => {
      const mod = e.ctrlKey || e.metaKey

      if (mod && e.key.toLowerCase() === 's') {
        e.preventDefault()
        saveFile()
      } else if (mod && e.shiftKey && e.key.toLowerCase() === 'p') {
        e.preventDefault()
        showPalette('commands')
      } else if (mod && e.key.toLowerCase() === 'p') {
        e.preventDefault()
        showPalette('files')
      } else if (mod && e.key.toLowerCase() === 'b') {
        e.preventDefault()
        toggleSidebar()
      } else if (mod && e.key.toLowerCase() === 'j') {
        e.preventDefault()
        toggleTerminal()
      } else if (mod && e.key.toLowerCase() === 'w') {
        e.preventDefault()
        closeCurrentTab()
      } else if (mod && e.key.toLowerCase() === 'i') {
        e.preventDefault()
        askAI()
      } else if (mod && e.key === 'Enter') {
        e.preventDefault()
        runFile()
      } else if (e.key === 'Escape' && paletteOverlay.style.display === 'flex') {
        hidePalette()
      }
    })

    openProjectBtn.onclick = openProjectByPath
    pickProjectBtn.onclick = pickProject
    saveBtn.onclick = saveFile
    runBtn.onclick = runFile
    themeBtn.onclick = toggleTheme
    askBtn.onclick = askAI
    applyBtn.onclick = applyAI

    applySavedTheme()
    await fetchProjectInfo()
    await fetchFiles()
    await loadTree()
  </script>
</body>
</html>
